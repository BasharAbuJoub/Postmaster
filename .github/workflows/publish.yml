name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore src/

      - name: Build
        run: dotnet build src/ --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/ --configuration Release --no-build
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./nupkgs

      - name: Get NuGet token via OIDC
        id: oidc
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" | jq -r '.value')
          NUGET_TOKEN=$(curl -sS -X POST "https://www.nuget.org/api/v3/trustedpublisher/getapitoken" \
            -H "Content-Type: application/json" \
            -d "\"$OIDC_TOKEN\"" | jq -r '.')
          echo "NUGET_TOKEN=$NUGET_TOKEN" >> $GITHUB_OUTPUT

      - name: Push to NuGet
        run: >
          dotnet nuget push "./nupkgs/*.nupkg"
          --api-key ${{ steps.oidc.outputs.NUGET_TOKEN }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
